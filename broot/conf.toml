###############################################################
# Top-Level Configuration
###############################################################

# Whether to mark the selected line with a triangle
show_selection_mark = true

# Max file size for content search
content_search_max_file_size = "10MB"

# Kitty Keyboard extension
enable_kitty_keyboard = false

# lines around matching line in filtered preview
lines_before_match_in_preview = 1
lines_after_match_in_preview = 1

# Activate modal mode
modal = true
initial_mode = "command"

# Set icons
icon_theme = "nerdfont"

###############################################################
# Special paths
###############################################################
[special_paths]
"/media" = { list = "never", sum = "never" }
"~/.config" = { show = "always" }
"trav" = { show = "always", list = "always", sum = "never" }


###############################################################
# Imports
###############################################################

[[imports]]
# Verbs are better configured in verbs.toml (or hjson). 
file = "verbs.hjson"

[[imports]]
# This file contains the skin to use when the terminal
# is dark (or when this couldn't be determined)
luma = [ "dark", "unknown" ]
file = "skins/everforest-dark.toml"

[[imports]]
# This skin is imported when your terminal is light
luma = [ "light" ]
file = "skins/white.hjson"


###############################################################
# Verbs (Custom Commands)
###############################################################

# Opens files in your default $EDITOR when pressing Enter, 
# while keeping standard directory navigation.
[[verbs]]
invocation = "edit"
key = "enter"
execution = "$EDITOR {file}"
leave_broot = false
apply_to = "file"

[[verbs]]
invocation = "edit"
key = "e"
execution = "$EDITOR {file}"
leave_broot = false
apply_to = "file"

# Move focus to the panel on the left (Vim style)
[[verbs]]
key = "ctrl-h"
internal = ":panel_left"

# Move focus to the panel on the right (Vim style)
[[verbs]]
key = "ctrl-l"
internal = ":panel_right"

[[verbs]]
key = "g"
internal = ":select_first"

[[verbs]]
key = "shift-g"
internal = ":select_last"

# Toggle showing only directories / folders
[[verbs]]
key = "f"
internal = ":toggle_files"

# Toggle between full tree depth and only the first level
[[verbs]]
key = "r"
internal = ":toggle_tree"

# Preview the file
[[verbs]]
key = "p"
internal = ":toggle_preview"

# Copy file content to clipboard (Wayland)
[[verbs]]
key = "c"
execution = "sh -c 'cat {file} | wl-copy'"
leave_broot = false
apply_to = "file"

