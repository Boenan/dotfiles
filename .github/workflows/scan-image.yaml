name: Scan Image

on:
  workflow_dispatch:
    inputs:
      containerfile:
        description: 'Image to scan (based on Containerfile)'
        required: true
        default: 'containerfile'
        type: choice
        options:
          - containerfile
          - containerfile.bg
          - containerfile.ubuntu

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "ghcr.io/boenan/dotfiles"

permissions:
  contents: read

jobs:
  scan-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set suffix
        id: vars
        run: |
          FILE="${{ inputs.containerfile }}"
          if [[ "$FILE" == "containerfile" ]]; then
            echo "suffix=" >> $GITHUB_OUTPUT
          else
            SUFFIX="${FILE#containerfile.}"
            echo "suffix=${SUFFIX}-" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy vulnerability scanners
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.suffix }}latest'
          format: 'table'
          exit-code: '0'  # Don't fail the build

      # Scan for GitHub Security integration
      - name: Run Trivy for GitHub Security
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.suffix }}latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
