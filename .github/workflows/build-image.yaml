name: Build and Push Container Image

on:
  workflow_dispatch:
    inputs:
      containerfile:
        description: 'Containerfile to build'
        required: true
        default: 'containerfile'
        type: choice
        options:
          - containerfile
          - containerfile.bg

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set suffix
        id: vars
        run: |
          FILE="${{ inputs.containerfile }}"
          if [[ "$FILE" == "containerfile" ]]; then
            echo "suffix=" >> $GITHUB_OUTPUT
          else
            SUFFIX="${FILE#containerfile.}"
            echo "suffix=${SUFFIX}-" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.suffix }}latest
            type=raw,value=${{ steps.vars.outputs.suffix }}{{sha}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ inputs.containerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
