general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    path = ~/Downloads/everforest-dark.jpg
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(167, 192, 128)
    inner_color = rgb(45, 53, 59)
    font_color = rgb(211, 198, 170)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    ignore_empty_input = true
}
